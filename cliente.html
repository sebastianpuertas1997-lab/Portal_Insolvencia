<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Seguimiento — Colombia Abogados</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--navy-l:#162240;--navy-d:#060e1a;--gold:#f59f00;--gold-l:#fff9db;--bg:#f7f8fb;--white:#fff;--muted:#5e6687;--light:#e4e8f1;--ok:#2b8a3e;--ok-bg:#ebfbee;--warn:#e67700;--warn-bg:#fff4e6;--err:#c92a2a;--info:#1971c2;--info-bg:#e7f5ff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:#1a1a2e;min-height:100vh;-webkit-font-smoothing:antialiased}
 
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);padding:24px}
.login-box{text-align:center;max-width:380px;width:100%}
.login-logo{width:72px;height:72px;border-radius:16px;background:linear-gradient(135deg,var(--navy),var(--navy-l));display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:32px;box-shadow:0 12px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.05)}
.login-box h1{font-size:26px;color:#fff;margin-bottom:6px}
.login-box .sub{color:var(--gold);font-size:10px;letter-spacing:3px;font-weight:700;text-transform:uppercase;margin-bottom:28px}
.login-fields{display:flex;flex-direction:column;gap:12px}
.login-box input{width:100%;padding:16px 20px;border-radius:12px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);font-size:17px;outline:none;text-align:center;font-family:'Outfit';font-weight:600;letter-spacing:2px;color:#fff;transition:border-color 0.2s}
.login-box input:focus{border-color:var(--gold)}
.login-box input::placeholder{color:rgba(255,255,255,0.25);letter-spacing:1px;font-size:13px;font-weight:400}
.pin-hint{font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px;text-align:center}
.login-box button{width:100%;margin-top:14px;padding:16px;border-radius:12px;border:none;background:var(--gold);color:var(--navy);font-weight:800;font-size:15px;cursor:pointer;transition:transform 0.1s,opacity 0.2s}
.login-box button:active{transform:scale(0.98)}
.login-box button:disabled{opacity:0.5;cursor:not-allowed}
.login-err{color:#ff6b6b;font-size:13px;margin-top:12px;min-height:18px}
.login-load{color:var(--gold);font-size:13px;margin-top:12px;display:none}
.login-load.show{display:block}
 
.portal{display:none}
.hdr{background:var(--navy);color:#fff;padding:24px 20px 20px}
.hdr-in{max-width:700px;margin:0 auto}
.back{background:none;border:none;color:rgba(255,255,255,0.4);font-size:13px;cursor:pointer;font-family:'Outfit';margin-bottom:14px;padding:4px 0}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.hdr-brand{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:3px}
.hdr h1{font-size:24px;margin:6px 0 4px;line-height:1.2}
.hdr-sub{font-size:13px;color:rgba(255,255,255,0.5)}
.ring{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ring-in{width:48px;height:48px;border-radius:50%;background:var(--navy-d);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800}
 
.dl{margin-top:20px;border-radius:12px;padding:16px 18px;display:none}
.dl.show{display:block}
.dl.ok{background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3)}
.dl.warn{background:rgba(217,119,6,0.12);border:1px solid rgba(217,119,6,0.3)}
.dl.danger{background:rgba(220,38,38,0.12);border:1px solid rgba(220,38,38,0.3)}
.dl-lb{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.dl-tt{font-size:16px;font-weight:700;margin-bottom:4px}
.dl-ds{font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:10px;line-height:1.5}
.dl-bar{height:8px;border-radius:4px;background:rgba(255,255,255,0.1);overflow:hidden}
.dl-fill{height:100%;border-radius:4px}
.dl-nums{display:flex;justify-content:space-between;font-size:12px;margin-top:6px;font-weight:600}
 
.ms{margin-top:24px}
.ms-wrap{position:relative;height:40px;margin-bottom:4px}
.ms-line{position:absolute;top:14px;left:8px;right:8px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px}
.ms-prog{position:absolute;top:14px;left:8px;height:4px;background:var(--gold);border-radius:2px}
.ms-dots{display:flex;justify-content:space-between;position:relative}
.ms-d{text-align:center;flex:1}
.ms-c{width:28px;height:28px;margin:0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.ms-c.done{background:var(--gold);color:var(--navy)}
.ms-c.act{background:#fff;color:var(--navy);box-shadow:0 0 0 4px rgba(245,159,0,0.25)}
.ms-c.pend{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.3);border:2px solid rgba(255,255,255,0.15)}
.ms-n{font-size:9px;margin-top:5px;line-height:1.3;color:rgba(255,255,255,0.45);font-weight:500}
.ms-n.done{color:var(--gold)}
.ms-n.act{color:#fff;font-weight:700}
 
.cnt{max-width:700px;margin:0 auto;padding:20px 16px 0}
 
.crds{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.crd{background:var(--white);border-radius:14px;padding:16px;border:1px solid var(--light);box-shadow:0 1px 3px rgba(10,22,40,0.04),0 4px 12px rgba(10,22,40,0.03)}
.crd-ic{font-size:20px;margin-bottom:6px}
.crd-lb{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.crd-vl{font-size:22px;font-weight:800;margin-top:3px;line-height:1.2}
.crd-sb{font-size:11px;color:var(--muted);margin-top:3px}
 
.act-box{background:var(--gold-l);border:1.5px solid rgba(245,159,0,0.3);border-radius:14px;padding:16px 18px;margin-bottom:16px}
.act-lb{font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.act-nm{font-size:17px;font-weight:700;color:var(--navy-d);margin-bottom:4px}
.act-ds{font-size:12px;color:var(--muted);line-height:1.6}
 
.sec{background:var(--white);border-radius:16px;box-shadow:0 1px 3px rgba(10,22,40,0.04),0 4px 12px rgba(10,22,40,0.03);border:1px solid var(--light);margin-bottom:16px;overflow:hidden}
.sec-btn{width:100%;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;background:none;border:none;cursor:pointer;font-family:'Outfit'}
.sec-t{font-size:17px;color:var(--navy);font-weight:700}
.sec-arr{font-size:20px;color:var(--muted);transition:transform 0.3s}
.sec-body{padding:0 20px 20px;display:none}
 
.tl{display:flex;gap:14px}
.tl-l{display:flex;flex-direction:column;align-items:center;width:22px}
.tl-dot{border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff}
.tl-cn{width:2px;flex:1;min-height:16px}
.tl-r{flex:1}
.tl-rw{display:flex;justify-content:space-between;align-items:center}
.tl-nm{font-size:14px}
.tl-dt{font-size:11px;color:var(--muted)}
.tl-desc{font-size:12px;color:var(--muted);margin:4px 0 0;line-height:1.6}
 
.pb{margin-bottom:16px}
.pb-info{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px}
.pb-trk{height:10px;background:var(--light);border-radius:5px}
.pb-fill{height:100%;background:var(--navy);border-radius:5px}
.pc{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.pc-t{font-size:11px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-bottom:8px}
.pi{padding:12px 14px;border-radius:12px;margin-bottom:10px}
.pi-nm{font-size:12px;font-weight:600;color:var(--navy-d);margin-bottom:4px}
.pi-rw{display:flex;justify-content:space-between;align-items:center}
.pi-am{font-size:16px;font-weight:800}
.pill{display:inline-block;padding:3px 12px;border-radius:16px;font-size:10px;font-weight:700}
.pi-dt{font-size:10px;color:var(--muted);margin-top:4px}

/* PAYMENT INFO BOX */
.pay-info{background:linear-gradient(135deg,#f8fafc,#eef2f7);border:1.5px solid var(--light);border-radius:14px;padding:18px;margin-bottom:16px}
.pay-info-t{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:12px}
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.04)}
.pay-row:last-child{border:none}
.pay-row-lb{font-size:11px;color:var(--muted);font-weight:600}
.pay-row-vl{font-size:13px;font-weight:700;color:var(--navy-d);text-align:right}
.pay-row-vl.copy{cursor:pointer;color:var(--info);text-decoration:underline dotted}
.pay-nequi{margin-top:12px;padding:12px 14px;background:var(--navy);border-radius:12px;display:flex;align-items:center;gap:10px}
.pay-nequi-lbl{font-size:11px;color:rgba(255,255,255,0.6)}
.pay-nequi-num{font-size:16px;font-weight:800;color:#fff;letter-spacing:1px}

/* REPORT PAYMENT BUTTON */
.pay-report-btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;background:#25D366;color:#fff;font-weight:800;font-size:14px;cursor:pointer;margin-top:8px;font-family:'Outfit';transition:transform 0.1s}
.pay-report-btn:active{transform:scale(0.98)}
.pay-report-btn-sub{font-size:10px;font-weight:400;opacity:0.85;margin-top:2px}

/* VERIFICANDO STATE */
.pill-verif{background:var(--info-bg);color:var(--info)}

.ftr{text-align:center;padding:16px 0 28px}
.ftr p{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:2px;text-transform:uppercase}

/* HELP BOX */
.help-box{background:#ebfbee;border:1.5px solid rgba(43,138,62,0.2);border-radius:14px;padding:16px 20px;margin-bottom:16px;text-align:center}
.help-txt{font-size:13px;color:var(--muted);margin-bottom:10px;font-weight:600}
.help-btn{width:100%;padding:14px;border-radius:12px;border:none;background:#25D366;color:#fff;font-weight:800;font-size:14px;cursor:pointer;font-family:'Outfit';transition:transform 0.1s}
.help-btn:active{transform:scale(0.98)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,0.2);z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:480px){
  .hdr h1{font-size:20px}
  .crds{grid-template-columns:1fr 1fr}
  .crd{padding:12px}.crd-vl{font-size:18px}
  .pc{grid-template-columns:1fr}
  .ring{width:54px;height:54px}.ring-in{width:42px;height:42px;font-size:14px}
  .ms-c{width:24px;height:24px;font-size:9px}.ms-n{font-size:8px}
}
@media(min-width:769px){.crds{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
 
<div class="login-wrap" id="loginView">
  <div class="login-box">
    <div class="login-logo">⚖️</div>
    <h1>Consulte su Proceso</h1>
    <p class="sub">Colombia Abogados</p>
    <div class="login-fields">
      <input type="text" id="cedInput" placeholder="Número de cédula" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      <input type="text" id="pinInput" placeholder="PIN de seguridad" inputmode="numeric" maxlength="6" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      <p class="pin-hint">PIN de 6 dígitos proporcionado por su abogado</p>
    </div>
    <button id="btnLogin" onclick="buscar()">Consultar</button>
    <p class="login-err" id="errMsg"></p>
    <p class="login-load" id="loadMsg">Buscando su caso...</p>
  </div>
</div>
 
<div class="portal" id="portalView">
  <div class="hdr">
    <div class="hdr-in">
      <button class="back" onclick="volver()">← Volver</button>
      <div class="hdr-top">
        <div>
          <p class="hdr-brand">Colombia Abogados</p>
          <h1 id="pNom">—</h1>
          <p class="hdr-sub" id="pInfo">—</p>
        </div>
        <div class="ring" id="ring"><div class="ring-in" id="ringTxt">0%</div></div>
      </div>
      <div id="dlBanner"></div>
      <div class="ms" id="msBar"></div>
    </div>
  </div>
  <div class="cnt">
    <div class="crds" id="cards"></div>
    <div id="actBox"></div>
    <div class="sec"><button class="sec-btn" onclick="tog(this)"><span class="sec-t">📌 Contexto del caso</span><span class="sec-arr">▾</span></button><div class="sec-body" id="ctx"></div></div>
    <div class="sec"><button class="sec-btn" onclick="tog(this)"><span class="sec-t">📋 Detalle del proceso</span><span class="sec-arr">▾</span></button><div class="sec-body" id="tl"></div></div>
    <div class="sec"><button class="sec-btn" onclick="tog(this)"><span class="sec-t">💰 Detalle de pagos</span><span class="sec-arr">▾</span></button><div class="sec-body" id="pays"></div></div>
    <div class="help-box">
      <p class="help-txt">¿Tiene dudas sobre su proceso?</p>
      <button class="help-btn" onclick="abrirAyuda()">💬 Escribir a mi abogado por WhatsApp</button>
    </div>
    <div class="ftr"><p>Colombia Abogados · Powered by ALIA</p></div>
  </div>
</div>

<div class="toast" id="toast"></div>
 
<script>
// ============================================================
//  ⚠️ CONFIGURACIÓN — CAMBIAR DESPUÉS DE DESPLEGAR APPS SCRIPT
// ============================================================
var API_URL = "https://script.google.com/macros/s/AKfycbyQNNLwNBSneokx7xBDaNOvyfYltTzD2u0X5-osbyQm5-kncz0NjQKzTVzIOKspbOMeuQ/exec";

// Datos del caso actual (se llenan al consultar)
var CASO = null;
var CED_ACTUAL = "";
var PIN_ACTUAL = "";

var fm=function(v){return new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",maximumFractionDigits:0}).format(v||0);};
function pD(v){if(!v)return null;var d=new Date(v);return isNaN(d.getTime())?null:d;}
function fD(v){var d=pD(v);if(!d)return"—";return d.toLocaleDateString("es-CO",{day:"numeric",month:"short",year:"numeric"});}
function dBt(a,b){var da=pD(a),db=pD(b);if(!da||!db)return 0;return Math.max(0,Math.round((db-da)/86400000));}

// ============================================================
//  BUSCAR — Login con cédula + PIN via API
// ============================================================
function buscar(){
  var ced=document.getElementById("cedInput").value.replace(/[^0-9]/g,"");
  var pin=document.getElementById("pinInput").value.replace(/[^0-9]/g,"");
  if(!ced){document.getElementById("errMsg").textContent="Ingrese su cédula";return;}
  if(!pin){document.getElementById("errMsg").textContent="Ingrese su PIN";return;}

  document.getElementById("errMsg").textContent="";
  document.getElementById("loadMsg").classList.add("show");
  document.getElementById("btnLogin").disabled=true;

  var url=API_URL+"?action=consultar&cedula="+encodeURIComponent(ced)+"&pin="+encodeURIComponent(pin);

  fetch(url,{redirect:"follow"})
    .then(function(r){return r.json();})
    .then(function(data){
      document.getElementById("loadMsg").classList.remove("show");
      document.getElementById("btnLogin").disabled=false;
      if(data.ok){
        CED_ACTUAL=ced;
        PIN_ACTUAL=pin;
        CASO=data.data;
        render(data.data);
      } else {
        document.getElementById("errMsg").textContent=data.error||"Error al consultar";
      }
    })
    .catch(function(){
      document.getElementById("loadMsg").classList.remove("show");
      document.getElementById("btnLogin").disabled=false;
      document.getElementById("errMsg").textContent="Error de conexión. Verifique su internet.";
    });
}

// ============================================================
//  RENDER — Pintar portal (misma lógica que tu código actual)
// ============================================================
function render(c){
  document.getElementById("loginView").style.display="none";
  document.getElementById("portalView").style.display="block";
  document.getElementById("pNom").textContent=c.nm||"—";
  var modT=c.mod==="ACUERDO"?"Acuerdo con Acreedores":c.mod==="LIQUIDACIÓN"||c.mod==="LIQUIDACION"?"Liquidación Patrimonial":c.mod;
  document.getElementById("pInfo").textContent=modT+(c.ab?" · "+c.ab:"");

  var vis=c.steps.filter(function(s){return!(s.op&&s.est==="PENDIENTE");});
  var done=vis.filter(function(s){return s.est==="COMPLETADO";}).length;
  var total=vis.length;
  var pct=total?Math.round(done/total*100):0;
  var active=null;
  for(var i=0;i<vis.length;i++){if(vis[i].est==="ACTIVO"){active=vis[i];break;}}

  document.getElementById("ring").style.background="conic-gradient(var(--gold) "+pct*3.6+"deg, rgba(255,255,255,0.08) "+pct*3.6+"deg)";
  document.getElementById("ringTxt").textContent=pct+"%";

  // Deadline calcs
  var s5=c.steps.filter(function(s){return s.id==="s5";})[0];
  var s7=c.steps.filter(function(s){return s.id==="s7";})[0];
  var s8=c.steps.filter(function(s){return s.id==="s8";})[0];
  var s9=c.steps.filter(function(s){return s.id==="s9";})[0];
  var dlAct=false,dlDays=0,dlMax=0,dlRest=0,dlTitle="",dlDesc="";

  if(s5&&s5.est==="COMPLETADO"&&s5.fecha&&s7&&s7.est!=="COMPLETADO"){
    dlDays=dBt(s5.fecha,new Date().toISOString());dlMax=15;dlRest=Math.max(0,15-dlDays);
    dlTitle="Plazo para Auto de Admisión";dlDesc="Desde que se completó la documentación, el centro tiene 15 días hábiles para emitir el auto de admisión.";dlAct=true;
  }
  if(s8&&s8.est==="COMPLETADO"&&s8.fecha&&s9&&s9.est!=="COMPLETADO"){
    dlDays=dBt(s8.fecha,new Date().toISOString());dlMax=60;dlRest=Math.max(0,60-dlDays);
    dlTitle="Plazo para Primera Audiencia";dlDesc="Desde la notificación a acreedores, hay 60 días hábiles para la primera audiencia de conciliación.";dlAct=true;
  }

  // Deadline banner
  var dlHTML="";
  if(dlAct){
    var cls=dlRest<=3?"danger":dlRest<=7?"warn":"ok";
    var col=dlRest<=3?"var(--err)":dlRest<=7?"var(--warn)":"var(--gold)";
    var lblCol=dlRest<=3?"#ff6b6b":dlRest<=7?"#fbbf24":"var(--gold)";
    var pctDl=Math.min(100,dlDays/dlMax*100);
    dlHTML='<div class="dl show '+cls+'"><p class="dl-lb" style="color:'+lblCol+'">⏱ Plazo legal activo</p><p class="dl-tt" style="color:#fff">'+dlTitle+'</p><p class="dl-ds">'+dlDesc+'</p><div class="dl-bar"><div class="dl-fill" style="width:'+pctDl+'%;background:'+col+'"></div></div><div class="dl-nums"><span style="color:rgba(255,255,255,0.5)">Día '+dlDays+' de '+dlMax+'</span><span style="color:'+col+';font-weight:800">'+dlRest+' días restantes</span></div></div>';
  }
  document.getElementById("dlBanner").innerHTML=dlHTML;

  // Milestone bar
  var milestones=vis.filter(function(s){return s.ms||s.id==="s1"||s.id==="s3"||s.id==="s5";});
  var msHTML='<div class="ms-wrap"><div class="ms-line"></div><div class="ms-prog" style="width:calc('+pct+'% - 16px)"></div><div class="ms-dots">';
  milestones.forEach(function(s){
    var isDone=s.est==="COMPLETADO",isAct=s.est==="ACTIVO";
    var cls2=isDone?"done":isAct?"act":"pend";
    msHTML+='<div class="ms-d"><div class="ms-c '+cls2+'">'+(isDone?"✓":isAct?"●":"")+'</div><p class="ms-n '+cls2+'">'+s.n+'</p></div>';
  });
  msHTML+='</div></div>';
  document.getElementById("msBar").innerHTML=msHTML;

  // Payments totals
  var paid=0,totalPay=0;
  c.pays.forEach(function(p){if(p.est==="PAGADO")paid+=p.mt;totalPay+=p.mt;});

  // === 4 KPI CARDS ===
  var h="";
  var deuTxt=c.deu?fm(c.deu):"No registrada";
  h+=mkC("💳","Deuda aprox.",deuTxt,"","var(--navy)");

  if(s5&&s5.est==="COMPLETADO"&&s7&&s7.est!=="COMPLETADO"){
    var dlCol=dlRest<=3?"var(--err)":dlRest<=7?"var(--warn)":"var(--navy)";
    h+=mkC("⏱","Auto admisión",dlRest+" días","de 15 días hábiles",dlCol);
  } else if(s7&&s7.est==="COMPLETADO"){
    h+=mkC("✅","Auto admisión","Admitido",fD(s7.fecha),"var(--ok)");
  } else {
    h+=mkC("📋","Auto admisión","Pendiente","Faltan documentos para radicación","var(--muted)");
  }

  h+=mkC("💰","Pagado",fm(paid),"de "+fm(totalPay),"var(--ok)");

  var abShort="—";
  if(c.ab){var parts=c.ab.trim().split(/\s+/);abShort=parts.length>=2?parts[0]+" "+parts[parts.length-1]:parts[0];}
  h+=mkC("👤","Abogado",abShort,"","var(--navy)");
  document.getElementById("cards").innerHTML=h;

  // Active step
  var aHTML="";
  if(active){
    aHTML='<div class="act-box"><p class="act-lb">Etapa actual</p><p class="act-nm">'+active.n+'</p><p class="act-ds">'+active.cd+'</p>';
    if(dlAct){
      var pctA=Math.min(100,dlDays/dlMax*100);
      var dlC=dlRest<=3?"var(--err)":dlRest<=7?"var(--warn)":"var(--navy)";
      aHTML+='<div style="margin-top:12px"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px"><span>Día '+dlDays+' de '+dlMax+'</span><span style="font-weight:800;color:'+dlC+'">'+dlRest+' días restantes</span></div><div style="height:8px;background:#e8e0c8;border-radius:4px"><div style="width:'+pctA+'%;height:100%;background:'+dlC+';border-radius:4px"></div></div></div>';
    }
    aHTML+='</div>';
  }
  document.getElementById("actBox").innerHTML=aHTML;

  // Context
  var ctxHTML="";
  if(c.desc){ctxHTML+='<div style="margin-bottom:14px"><p style="font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Descripción del caso</p><p style="font-size:13px;color:var(--navy-d);line-height:1.7">'+c.desc+'</p></div>';}
  if(c.est){ctxHTML+='<div><p style="font-size:10px;font-weight:700;color:#a68a3e;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Estrategia jurídica</p><p style="font-size:13px;color:var(--navy-d);line-height:1.7">'+c.est+'</p></div>';}
  if(!ctxHTML){ctxHTML='<p style="font-size:13px;color:var(--muted)">Información no disponible aún.</p>';}
  document.getElementById("ctx").innerHTML=ctxHTML;

  // Timeline
  var tHTML="";
  vis.forEach(function(s,i){
    var isL=i===vis.length-1;var isDone=s.est==="COMPLETADO",isAct=s.est==="ACTIVO";
    var col2=isDone?"var(--ok)":isAct?"var(--navy)":"var(--light)";var sz=s.ms?22:16;
    tHTML+='<div class="tl" style="padding-bottom:'+(isL?0:18)+'px"><div class="tl-l"><div class="tl-dot" style="width:'+sz+'px;height:'+sz+'px;background:'+(isDone?col2:"var(--white)")+';border:3px solid '+col2+';'+(isAct?"box-shadow:0 0 0 3px rgba(0,40,85,0.15);":"")+'">'+(isDone?"✓":"")+'</div>';
    if(!isL)tHTML+='<div class="tl-cn" style="background:'+(isDone?"var(--ok)":"var(--light)")+'"></div>';
    tHTML+='</div><div class="tl-r"><div class="tl-rw"><span class="tl-nm" style="font-weight:'+(isAct?800:600)+';color:'+(!isDone&&!isAct?"var(--muted)":"var(--navy-d)")+'">'+s.n+'</span>';
    if(s.fecha)tHTML+='<span class="tl-dt">'+fD(s.fecha)+'</span>';
    tHTML+='</div>';if(isDone||isAct)tHTML+='<p class="tl-desc">'+s.cd+'</p>';tHTML+='</div></div>';
  });
  document.getElementById("tl").innerHTML=tHTML;

  // === PAYMENTS (con info bancaria + botón reportar) ===
  var honP=c.pays.filter(function(p){return p.cat==="hon";});
  var cenP=c.pays.filter(function(p){return p.cat==="cen";});

  var pHTML='<div class="pb"><div class="pb-info"><span>'+fm(paid)+' pagados</span><span>'+fm(totalPay)+' total</span></div><div class="pb-trk"><div class="pb-fill" style="width:'+(totalPay?paid/totalPay*100:0)+'%"></div></div></div>';

  // Datos bancarios
  if(c.banco && hasPendiente(c.pays)){
    pHTML+='<div class="pay-info">';
    pHTML+='<p class="pay-info-t">💳 Datos para transferencia</p>';
    pHTML+='<div class="pay-row"><span class="pay-row-lb">Banco</span><span class="pay-row-vl">'+c.banco.nombre+'</span></div>';
    pHTML+='<div class="pay-row"><span class="pay-row-lb">Tipo</span><span class="pay-row-vl">'+c.banco.tipo+'</span></div>';
    pHTML+='<div class="pay-row"><span class="pay-row-lb">Cuenta</span><span class="pay-row-vl copy" onclick="copiar(\''+c.banco.cuenta+'\')">'+c.banco.cuenta+' 📋</span></div>';
    pHTML+='<div class="pay-row"><span class="pay-row-lb">Titular</span><span class="pay-row-vl">'+c.banco.titular+'</span></div>';
    pHTML+='<div class="pay-row"><span class="pay-row-lb">NIT</span><span class="pay-row-vl">'+c.banco.nit+'</span></div>';
    if(c.banco.nequi){
      pHTML+='<div class="pay-nequi"><div><p class="pay-nequi-lbl">Nequi</p><p class="pay-nequi-num" onclick="copiar(\''+c.banco.nequi+'\')">'+c.banco.nequi+' 📋</p></div></div>';
    }
    pHTML+='</div>';
  }

  // Columnas de pagos
  pHTML+='<div class="pc"><div><p class="pc-t" style="border-bottom:2px solid var(--navy)">Honorarios Firma</p>';
  honP.forEach(function(p,i){pHTML+=mkP(p,i);});
  pHTML+='</div><div><p class="pc-t" style="border-bottom:2px solid var(--gold)">Centro Conciliación</p>';
  cenP.forEach(function(p,i){pHTML+=mkP(p,i+honP.length);});
  pHTML+='</div></div>';

  document.getElementById("pays").innerHTML=pHTML;
}

// ============================================================
//  HELPERS
// ============================================================
function mkC(ic,lb,vl,sb,col){return'<div class="crd"><div class="crd-ic">'+ic+'</div><div class="crd-lb">'+lb+'</div><div class="crd-vl" style="color:'+col+'">'+vl+'</div>'+(sb?'<div class="crd-sb">'+sb+'</div>':'')+'</div>';}

function mkP(p,globalIdx){
  var isPd=p.est==="PAGADO";
  var isVer=p.est==="VERIFICANDO";
  var bg=isPd?"var(--ok-bg)":isVer?"var(--info-bg)":"var(--bg)";
  var brd=isPd?"#bbf7d0":isVer?"#bfdbfe":"var(--light)";
  var amC=isPd?"var(--ok)":isVer?"var(--info)":"var(--navy-d)";
  var pBg=isPd?"var(--ok-bg)":isVer?"var(--info-bg)":"var(--warn-bg)";
  var pC=isPd?"var(--ok)":isVer?"var(--info)":"var(--warn)";
  var pT=isPd?"✓ Pagado":isVer?"⏳ En verificación":"Pendiente";
  var dt=isPd&&p.fe?"Pagado: "+fD(p.fe):p.fe?"Vence: "+fD(p.fe):"";

  var h='<div class="pi" style="background:'+bg+';border:1px solid '+brd+'"><div class="pi-nm">'+p.nm+'</div><div class="pi-rw"><span class="pi-am" style="color:'+amC+'">'+fm(p.mt)+'</span><span class="pill" style="color:'+pC+';background:'+pBg+'">'+pT+'</span></div>';
  if(dt)h+='<div class="pi-dt">'+dt+'</div>';

  // Botón de reportar pago (solo si pendiente y monto > 0)
  if(!isPd && !isVer && p.mt > 0){
    h+='<button class="pay-report-btn" onclick="reportarPago('+globalIdx+',\''+encodeURIComponent(p.nm)+'\','+p.mt+')">📲 Reportar pago por WhatsApp<div class="pay-report-btn-sub">Envíe su comprobante de transferencia</div></button>';
  }
  if(isVer){
    h+='<div style="margin-top:6px;font-size:11px;color:var(--info);font-weight:600">Su comprobante está siendo verificado</div>';
  }

  return h+'</div>';
}

function hasPendiente(pays){
  for(var i=0;i<pays.length;i++){if(pays[i].est!=="PAGADO")return true;}
  return false;
}

// ============================================================
//  REPORTAR PAGO — Abre WhatsApp con mensaje pre-llenado
// ============================================================
function reportarPago(pagoIdx, pagoNombre, monto){
  if(!CASO || !CASO.banco) return;

  var nombre = CASO.nm || "Cliente";
  var concepto = decodeURIComponent(pagoNombre);
  var montoTxt = fm(monto);

  var msg = "Hola, soy *" + nombre + "*\n"
    + "Cédula: " + CED_ACTUAL + "\n\n"
    + "Reporto pago de: *" + concepto + "*\n"
    + "Monto: *" + montoTxt + "*\n\n"
    + "📎 _Adjunto comprobante de transferencia_";

  var waUrl = "https://wa.me/" + CASO.banco.wa + "?text=" + encodeURIComponent(msg);
  window.open(waUrl, "_blank");

  showToast("Se abrirá WhatsApp para enviar su comprobante");
}

// ============================================================
//  COPIAR AL PORTAPAPELES
// ============================================================
function copiar(txt){
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(function(){showToast("Copiado: "+txt);});
  } else {
    var el=document.createElement("textarea");el.value=txt;document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);
    showToast("Copiado: "+txt);
  }
}

function showToast(msg){
  var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2500);
}

function tog(b){var bd=b.nextElementSibling;var a=b.querySelector(".sec-arr");if(bd.style.display==="block"){bd.style.display="none";a.style.transform="rotate(0deg)";}else{bd.style.display="block";a.style.transform="rotate(180deg)";}}
function volver(){document.getElementById("portalView").style.display="none";document.getElementById("loginView").style.display="flex";document.getElementById("cedInput").value="";document.getElementById("pinInput").value="";document.getElementById("errMsg").textContent="";CASO=null;CED_ACTUAL="";PIN_ACTUAL="";}

// Enter en cédula → focus PIN, Enter en PIN → buscar
document.getElementById("cedInput").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();document.getElementById("pinInput").focus();}});
document.getElementById("pinInput").addEventListener("keydown",function(e){if(e.key==="Enter")buscar();});

function abrirAyuda(){
  if(!CASO) return;
  var nombre = CASO.nm || "Cliente";
  var msg = "Hola, soy *" + nombre + "* (CC: " + CED_ACTUAL + ").\n\n"
    + "Tengo una consulta sobre mi proceso de insolvencia.\n\n"
    + "_Escriba su pregunta aquí:_";
  var waUrl = "https://wa.me/" + (CASO.banco ? CASO.banco.wa : "573043774232") + "?text=" + encodeURIComponent(msg);
  window.open(waUrl, "_blank");
}
</script>
