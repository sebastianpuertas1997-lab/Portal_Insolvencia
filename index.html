<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colombia Abogados — Portal Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;min-height:100vh;background:#0a1628;color:#fff;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.hero{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%,rgba(59,91,219,0.08) 0%,transparent 50%),radial-gradient(circle at 70% 60%,rgba(245,159,0,0.06) 0%,transparent 50%);animation:drift 20s ease-in-out infinite}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,10px)}}
.content{position:relative;z-index:1;text-align:center;max-width:600px;width:100%}
.logo{width:200px;height:200px;border-radius:40px;background:linear-gradient(135deg,#162240,#1e3a5f);display:flex;align-items:center;justify-content:center;margin:0 auto 32px;font-size:32px;box-shadow:0 20px 60px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.08),0 0 80px rgba(59,91,219,0.15)}
h1{font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px;line-height:1.1}
h1 span{color:#f59f00}
.sub{color:rgba(255,255,255,0.3);font-size:11px;letter-spacing:4px;text-transform:uppercase;font-weight:600;margin-bottom:48px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px}
.card{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);border-radius:20px;padding:32px 24px;cursor:pointer;transition:all 0.3s;text-decoration:none;color:#fff;position:relative;overflow:hidden}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(59,91,219,0.1),transparent);opacity:0;transition:opacity 0.3s}
.card:hover{border-color:rgba(255,255,255,0.2);transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.card:hover::after{opacity:1}
.card-icon{font-size:36px;margin-bottom:14px;position:relative;z-index:1}
.card-title{font-size:18px;font-weight:800;margin-bottom:6px;position:relative;z-index:1}
.card-desc{font-size:12px;color:rgba(255,255,255,0.4);line-height:1.6;position:relative;z-index:1}
.card-badge{position:absolute;top:14px;right:14px;background:#f59f00;color:#0a1628;font-size:9px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;z-index:1}
.footer{text-align:center;padding:20px;color:rgba(255,255,255,0.15);font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase}
.footer a{color:rgba(255,255,255,0.25);text-decoration:none}
.footer a:hover{color:#f59f00}
@media(max-width:500px){.cards{grid-template-columns:1fr}h1{font-size:26px}.card{padding:24px 20px}}
</style>
</head>
<body>
<div class="hero">
<div class="content">
<div class="logo"><img src="https://i.imgur.com/N02fxI9.png" alt="Logo" style="width:170px;height:170px;border-radius:32px;object-fit:contain" onerror="this.style.display='none';this.parentElement.textContent='⚖️'"></div>
<h1>Colombia <span>Abogados</span></h1>
<p class="sub">Portal Digital</p>
<div class="cards">
<a class="card" href="index.html">
<div class="card-icon">🔐</div>
<div class="card-title">Mi Proceso</div>
<div class="card-desc">Consulte el estado de su caso, pagos y etapas con su cédula y PIN de seguridad.</div>
</a>
<a class="card" href="admin.html">
<div class="card-badge">Staff</div>
<div class="card-icon">⚙️</div>
<div class="card-title">Operaciones</div>
<div class="card-desc">Panel administrativo para gestión de clientes, pagos, procesos y comisiones.</div>
</a>
</div>
</div>
</div>
<div class="footer">Powered by <a href="#">ALIA</a> — Tecnología legal inteligente</div>
</body>
</html>
